<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://abacus.jasoncameron.dev; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'">
<title>SEVENTEEN 相性診断 / 궁합 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f1ede2;
    --card:#fffdf6;
    --ink:#1c1b18;
    --ink-soft:#726c5f;
    --accent:#df6f8c;
    --accent-d:#cc5d7b;
    --track:#e7e0d2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Noto Sans JP","Noto Sans KR","Hiragino Kaku Gothic ProN","Malgun Gothic",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink); min-height:100%;
    display:flex; align-items:flex-start; justify-content:center;
    padding:34px 16px 66px;
    -webkit-font-smoothing:antialiased;
    transition:background .5s ease;
    touch-action:manipulation;
  }
  .wrap{width:100%; max-width:588px; position:relative}

  .langbar{display:flex; justify-content:flex-end; margin-bottom:18px}
  .langbar button{
    border:1.5px solid var(--ink); background:transparent; color:var(--ink);
    padding:6px 15px; font-size:12.5px; font-weight:700; cursor:pointer; letter-spacing:.03em; transition:.12s;
  }
  .langbar button + button{border-left:none}
  .langbar button.on{background:var(--ink); color:var(--paper)}

  .card{
    background:var(--card); border:1.5px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);
    padding:34px 30px 30px; position:relative;
  }
  .card.intro{display:flex; flex-direction:column; min-height:calc(100vh - 150px)}
  .card.intro .note{margin-top:auto}
  .card.intro .btn{margin-top:14px}
  .note{font-size:11px; color:#9a9488; line-height:1.75; margin:0}
  .card.result{display:flex; flex-direction:column; min-height:calc(100vh - 150px)}
  .card.result .rshare{margin-top:auto}
  .card.result .btn.ghost{margin-top:10px}

  .kicker{font-size:12px; letter-spacing:.24em; font-weight:800; color:var(--accent); text-transform:uppercase}
  h1{font-size:27px; line-height:1.45; margin:2px 0 6px; font-weight:700; letter-spacing:-.01em}
  h1 .g{color:var(--accent)}
  .lead{color:var(--ink-soft); font-size:14px; line-height:1.9; margin:16px 0 4px}
  .lead small{display:inline-block; margin-top:12px; font-size:11px; color:#9a9488; line-height:1.75}

  .btn{
    display:block; width:100%; border:1.5px solid var(--ink); cursor:pointer;
    background:var(--accent); color:#fff;
    font-size:15.5px; font-weight:800; letter-spacing:.03em; padding:15px;
    box-shadow:4px 4px 0 var(--ink); transition:transform .1s, box-shadow .1s; margin-top:24px;
  }
  .btn:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink)}
  .btn.ghost{background:var(--card); color:var(--ink); box-shadow:none; margin-top:12px}
  .btn.ghost:hover{background:#efe9dc; transform:none; box-shadow:none}

  .prog{height:6px; background:var(--track); border:1.5px solid var(--ink); overflow:hidden; margin-bottom:10px}
  .prog i{display:block; height:100%; width:0; background:linear-gradient(90deg, var(--accent) 0%, #bd7fbf 50%, #7fa8e6 100%); background-size:calc(10000% / var(--p, 100)) 100%; background-repeat:no-repeat; background-position:left center; transition:.35s}
  .qcount{font-size:11px; font-weight:800; color:var(--ink-soft); letter-spacing:.16em; text-transform:uppercase; margin-bottom:18px; text-align:right}
  .back{display:inline-flex; align-items:center; gap:8px; background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:700; cursor:pointer; padding:2px 0; margin-bottom:14px; transition:.12s}
  .back:hover{color:var(--accent)}
  .back svg{width:17px; height:17px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round}
  .qtext{font-size:19.5px; line-height:1.55; font-weight:700; letter-spacing:-.01em; margin-bottom:22px; min-height:30px}
  .opts{display:flex; flex-direction:column; gap:10px}
  .opt{
    text-align:left; border:1.5px solid var(--ink); background:var(--card); color:var(--ink);
    padding:14px 16px; font-size:14.5px; line-height:1.5; font-weight:600; cursor:pointer;
    transition:transform .1s, box-shadow .1s, background .1s, color .1s; box-shadow:3px 3px 0 rgba(28,27,24,.13);
  }
  .opt:active{background:var(--accent); color:#fff; box-shadow:4px 4px 0 var(--ink); transform:translate(-1px,-1px)}
  @media (hover:hover){ .opt:hover{background:var(--accent); color:#fff; box-shadow:4px 4px 0 var(--ink); transform:translate(-1px,-1px)} }

  .imgopts{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .imgopt{border:1.5px solid var(--ink); background:var(--card); padding:10px; cursor:pointer;
    display:flex; flex-direction:column; gap:9px; align-items:center; text-align:center;
    transition:transform .1s, box-shadow .1s; box-shadow:3px 3px 0 rgba(28,27,24,.13)}
  .imgopt:active{transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--ink)}
  @media (hover:hover){ .imgopt:hover{transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--ink)} }
  .imgopt img{width:100%; aspect-ratio:1/1; object-fit:cover; border:1.5px solid var(--ink); display:block; background:#eae4d6}
  .imgopt span{font-size:12.5px; font-weight:700; line-height:1.45; color:var(--ink)}

  .rmatch{text-align:center; font-size:11px; font-weight:800; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; margin-bottom:14px}
  .rface{
    position:relative; overflow:hidden;
    width:96px; height:96px; border:1.5px solid var(--ink); box-shadow:5px 5px 0 var(--ink); margin:0 auto 14px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:800; color:#fff; letter-spacing:.02em;
  }
  .rface img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .rpct{text-align:center; font-size:22px; font-weight:800; color:var(--accent); letter-spacing:.01em; margin:0 0 2px}
  .rname{text-align:center; font-size:29px; font-weight:800; letter-spacing:-.01em; margin:2px 0 4px}
  .rtitle{text-align:center; font-size:13px; font-weight:800; color:var(--ink); margin-bottom:20px}
  .rdesc{font-size:13px; line-height:1.9; color:#37342c; background:#f4eee1; border:1.5px solid var(--ink); padding:13px 15px; margin-bottom:22px}
  .rhit{text-align:center; font-size:10.5px; font-weight:800; color:var(--accent); margin:0 0 2px; line-height:1.4}
  .tabs{display:flex; margin-bottom:12px}
  .tab{flex:1; border:1.5px solid var(--ink); background:var(--card); color:var(--ink-soft); font-size:12.5px; font-weight:800; padding:8px; cursor:pointer; transition:.12s}
  .tab + .tab{border-left:none}
  .tab.on{background:var(--ink); color:var(--paper)}
  .tlist{list-style:none; margin:0 0 22px; padding:0}
  .tlist li{position:relative; font-size:12.5px; font-weight:600; color:#3a372f; padding:7px 0 7px 16px; border-bottom:1px dashed rgba(28,27,24,.2)}
  .tlist li:last-child{border-bottom:none}
  .tlist li::before{content:"—"; position:absolute; left:0; color:var(--accent); font-weight:800}
  .rshare{text-align:center; font-size:12.5px; font-weight:800; color:var(--accent); cursor:pointer; padding:8px; user-select:none; text-decoration:underline; text-underline-offset:3px; text-decoration-thickness:1.5px}
  .rshare.done{color:var(--ink-soft); text-decoration:none}

  .axleg{display:flex; justify-content:center; align-items:center; gap:6px; font-size:10.5px; font-weight:800; color:var(--ink-soft); margin-bottom:14px}
  .axleg .sw{display:inline-block}
  .axleg .sw-m{width:9px; height:12px; background:var(--accent); border:1.5px solid var(--ink)}
  .axleg .sw-u{width:12px; height:12px; border-radius:50%; background:var(--card); border:1.5px solid var(--ink)}
  .axes2{display:grid; grid-template-columns:1fr 1fr; column-gap:16px; row-gap:14px; margin:2px 0 22px}
  .axis{margin:0}
  .axis-l{display:flex; justify-content:space-between; font-size:11px; font-weight:800; color:var(--ink-soft); margin-bottom:5px}
  .axis-t{position:relative; height:6px; background:var(--track); border:1.5px solid var(--ink)}
  .axis-t .mk{position:absolute; top:50%; transform:translate(-50%,-50%); border:1.5px solid var(--ink)}
  .axis-t .mk-m{width:9px; height:15px; background:var(--accent)}
  .axis-t .mk-u{width:14px; height:14px; border-radius:50%; background:var(--card)}
  .subhead{display:flex; align-items:center; gap:12px; font-size:11px; font-weight:800; letter-spacing:.18em; color:var(--ink); text-transform:uppercase; margin:6px 0 14px}
  .subhead::before, .subhead::after{content:""; flex:1; height:1.5px; background:var(--ink)}
  .rank{margin:6px 0 20px}
  .rankrow{display:grid; grid-template-columns:22px 96px 1fr 40px; align-items:center; gap:9px; margin-bottom:8px}
  .rankrow .rk{font-size:12px; font-weight:800; color:#bcb3a1; text-align:center}
  .rankrow .rn{font-size:12.5px; font-weight:800; color:var(--ink); white-space:nowrap}
  .rankrow .rb{height:13px; background:var(--track); border:1.5px solid var(--ink); overflow:hidden}
  .rankrow .rb i{display:block; height:100%}
  .rankrow .rp{font-size:12px; font-weight:800; color:var(--ink-soft); text-align:right}
  .rankrow.top .rn{color:var(--accent)}
  .rankrow.top .rk{color:var(--accent)}

  .foot{text-align:center; font-size:10.5px; color:#a49d8e; margin-top:18px; line-height:1.7}
  @media(max-width:480px){
    .card{padding:26px 20px; box-shadow:6px 6px 0 var(--ink)}
    h1{font-size:25px}
    .qtext{font-size:18px}
    .rname{font-size:27px}
    .rankrow{grid-template-columns:18px 84px 1fr 30px; gap:7px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar">
    <button id="lang-ja" class="on" onclick="setLang('ja')">日本語</button>
    <button id="lang-ko" onclick="setLang('ko')">한국어</button>
  </div>
  <div class="card" id="card"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ============================================================
   SEVENTEEN 相性診断 — メンバー投票制
   採点: 各選択肢の m:[memberId...] にメンバーを割り当てる。
        回答されるとそのメンバーに1票。最多得票が診断結果。
   member id: scoups jeonghan joshua jun hoshi wonwoo woozi
              the8 mingyu dk seungkwan vernon dino
   ============================================================ */

const MEMBERS = [
  { id:"scoups", color:"#e4788f", init:"SC", name:"S.COUPS",
    title:{ja:"沈思黙考の努力家リーダー", ko:"심사숙고하는 노력파 리더"},
    sim:{ja:"気質が <b>DK・SEUNGKWAN</b> と同じ", ko:"기질이 <b>도겸·승관</b>과 같음"},
    desc:{ja:"繊細に感情をキャッチする、感受性豊かなタイプ。興味はあってもすぐ動かず、じっくり考える沈思黙考派。礼儀正しく、自分も周りも高めたい上昇志向。頼られれば自分を後回しにしてでも動く、リーダー向きの寛大さ。達成しても満足しきれない、努力家の完璧主義。",
        ko:"섬세하게 감정을 캐치하는, 감수성 풍부한 타입. 관심은 있어도 바로 움직이지 않고 곰곰이 생각하는 심사숙고파. 예의 바르고, 나도 주변도 끌어올리고 싶은 상승 지향. 기대오면 자신을 뒤로 미루고 움직이는, 리더형 너그러움. 이뤄내도 스스로는 만족 못 하는 노력파의 완벽주의."} },

  { id:"jeonghan", color:"#c98bd6", init:"JH", name:"JEONGHAN",
    title:{ja:"気まぐれマルチーズ", ko:"변덕쟁이 말티즈"}, sim:null,
    desc:{ja:"刺激に惹かれつつ、軽率には飛び込まない慎重派。追い込まれると不安定、安心すると急に大胆になる読めなさ。外向か内向か一見わからない、気まぐれな二面性。持続力は低めで『まあこれくらいで』が口ぐせ。冗談で場を和ませる一方、争いを避けて本音を飲み込むことも。",
        ko:"자극에 끌리면서도 경솔하게 뛰어들지 않는 신중파. 궁지에 몰리면 불안정, 안심하면 갑자기 대담해지는 종잡을 수 없음. 외향인지 내향인지 한눈에 알기 어려운 변덕스러운 양면성. 인내력은 낮은 편이라 '이 정도면 됐지'가 습관. 농담으로 분위기를 풀면서도, 다툼을 피하려 속마음을 삼키기도."} },

  { id:"joshua", color:"#7ea6e6", init:"JS", name:"JOSHUA",
    title:{ja:"独創的な社交家", ko:"독창적인 사교가"},
    sim:{ja:"性格が <b>THE 8</b> と同じ／気質は <b>MINGYU</b> とも", ko:"성격이 <b>디에잇</b>과 같고 기질은 <b>민규</b>와도"},
    desc:{ja:"認められ愛されたい、社交を楽しむタイプ。感情豊かで、注目が集まる場が好き。起伏が激しく、外の空気に敏感な繊細さも。独創的でクリエイティブ、集団でよく目立つ存在。派手さより着実さ、飾らない誠実さと独特のユーモアで信頼を集める人。",
        ko:"인정·사랑받고 싶은, 어울림을 즐기는 타입. 감정이 풍부하고 주목이 모이는 자리를 좋아함. 기복이 크고 바깥 분위기에 예민한 섬세함도. 독창적이고 창의적이라 무리에서 잘 눈에 띄는 존재. 화려함보다 착실함, 꾸밈없는 성실함과 독특한 유머로 신뢰를 얻는 사람."} },

  { id:"jun", color:"#6fc4b8", init:"JUN", name:"JUN",
    title:{ja:"大胆な冒険家", ko:"대담한 모험가"}, sim:null,
    desc:{ja:"初対面でも迷わず飛び込む、行動派の外向タイプ。危険もスリルも楽しむ、大胆なチャレンジャー。繰り返しは苦手で、常に変化を求める刺激好き。深い共感や、違う考えを受け入れるのは少し苦手。好奇心旺盛だけど、極める前に次へ移りやすい移り気。",
        ko:"처음 보는 사이에도 망설임 없이 뛰어드는 행동파 외향 타입. 위험도 스릴도 즐기는 대담한 챌린저. 반복은 싫어하고 늘 변화를 원하는 자극파. 깊은 공감이나 다른 생각을 받아들이는 건 조금 어려워함. 호기심은 왕성하지만, 파고들기 전에 다음으로 옮겨가는 변덕."} },

  { id:"hoshi", color:"#f0985a", init:"HS", name:"HOSHI",
    title:{ja:"情熱と責任感No.1", ko:"열정과 책임감 1위"}, sim:null,
    desc:{ja:"内気に見えて、実は感受性と瞬発力あふれる情熱家。感情が大きく揺れ、気まぐれに『内気アピール』する一面も。『自分ならできる』の確信で、任されたら全力投球。誰よりも強い、やり遂げる意志のリーダー気質。好奇心旺盛で、ときどき突飛な発想も飛び出すタイプ。",
        ko:"수줍어 보이지만 사실은 감수성과 순발력이 넘치는 열정가. 감정이 크게 흔들리고, 변덕스럽게 '내향인 척' 어필하는 면도. '나라면 된다'는 확신으로, 맡으면 전력투구. 누구보다 강한, 해내려는 의지의 리더 기질. 호기심이 왕성해 가끔 엉뚱한 발상도 튀어나오는 타입."} },

  { id:"wonwoo", color:"#5b6bb0", init:"WW", name:"WONWOO",
    title:{ja:"物静かな知性派", ko:"조용한 지성파"},
    sim:{ja:"気質が <b>DINO</b> と同じ", ko:"기질이 <b>디노</b>와 같음"},
    desc:{ja:"あらゆる可能性を考えて動く、慎重な判断派。少し臆病で、クールに見られることも。人見知りで打ち解けに時間はかかるけど、心を許すとまっすぐ向き合う人。そばにいると場が和む、あたたかい優しさの持ち主。人の感情に影響されやすく、繊細に傷つきやすい一面も。",
        ko:"온갖 가능성을 따져 움직이는 신중한 판단파. 조금 소심해서 쿨하게 보일 때도. 낯을 가려 친해지는 데 시간은 걸리지만, 마음을 열면 진심으로 대하는 사람. 곁에 있으면 분위기가 편안해지는 따뜻한 다정함의 소유자. 남의 감정에 영향을 잘 받고 섬세하게 상처받기 쉬운 면도."} },

  { id:"woozi", color:"#8f7ad6", init:"WZ", name:"WOOZI",
    title:{ja:"クールな完璧主義者", ko:"쿨한 완벽주의자"}, sim:null,
    desc:{ja:"細部まで見逃さない、『社長』肌の完璧主義者。ルールや基準をきっちり守り、体系立てて仕上げるタイプ。感情は表に出さず、自分でコントロールするクールさ。協力より、一人で突き詰める職人スタイル。少し頑固に見えても、妥協のなさが高いクオリティを生む努力家。",
        ko:"디테일까지 놓치지 않는 '사장님' 기질의 완벽주의자. 규칙과 기준을 확실히 지키며 체계적으로 마무리하는 타입. 감정은 드러내지 않고 스스로 조절하는 쿨함. 협업보다 혼자 파고드는 장인 스타일. 조금 고집스러워 보여도, 타협 없는 태도가 높은 완성도를 만드는 노력파."} },

  { id:"the8", color:"#59b3a0", init:"T8", name:"THE 8",
    title:{ja:"独創的な表現者", ko:"독창적인 표현가"},

/* ---------- state ---------- */
let lang = "ja";
let step = -1;            // -1 intro, 0..n-1 questions, n result
let votes = {};
let history = [];         // 回答した選択肢を順に記録（戻る用）
let hitState = null;      // {id,n} 90%以上カウンターの取得結果
let hitBusy = false;
const card = document.getElementById("card");
const foot = document.getElementById("foot");

function resetScores(){ votes={}; history=[]; MEMBERS.forEach(m=> votes[m.id]=0); }

function setLang(l){
  lang=l;
  document.getElementById("lang-ja").classList.toggle("on", l==="ja");
  document.getElementById("lang-ko").classList.toggle("on", l==="ko");
  render();
}

function startQuiz(){ resetScores(); hitState=null; hitBusy=false; step=0; render(); }

// 90%以上一致カウンター（無料カウンターAPI: abacus）
function fetchHit(id, cb){
  fetch('https://abacus.jasoncameron.dev/hit/httpyeoreum-seventeen-type/'+id+'-p90')
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d && (d.value!==undefined ? d.value : d.count)); })
    .catch(function(){ cb(null); });
}

// URLをクリップボードにコピー（フォールバック付き）
function copyUrl(){
  var el=document.getElementById('rshare');
  var ok=function(){ if(!el) return; el.textContent=T[lang].copied; el.classList.add('done'); setTimeout(function(){ if(el){ el.textContent=T[lang].share; el.classList.remove('done'); } },1800); };
  var url=location.href;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(ok, function(){ legacyCopy(url,ok); });
  } else { legacyCopy(url,ok); }
}
function legacyCopy(text, ok){
  try{ var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); ok(); }catch(e){}
}

// 傾向分析タブ切替
function setTab(t){
  var tabs=document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++) tabs[i].classList.toggle('on', tabs[i].getAttribute('data-t')===t);
  var ls=document.querySelectorAll('.tlist');
  for(var j=0;j<ls.length;j++) ls[j].style.display = (ls[j].getAttribute('data-t')===t) ? '' : 'none';
}

function answer(opt){
  history.push(opt);
  (opt.m||[]).forEach(id=>{ if(votes[id]!=null) votes[id]++; });
  step++;
  render();
}

function goBack(){
  if(step<=0){ step=-1; render(); return; }   // 最初の問題 → イントロへ
  step--;
  const prev=history.pop();
  if(prev){ (prev.m||[]).forEach(id=>{ if(votes[id]!=null) votes[id]--; }); }
  render();
}

function ranked(){
  const total=QUESTIONS.length;
  return MEMBERS
    .map((m,i)=>({ m, v:votes[m.id], pct:Math.round(votes[m.id]/total*100), i }))
    .sort((a,b)=> b.v-a.v || a.i-b.i );
}

/* ---------- render ---------- */
function _rgb(hex){const n=parseInt(hex.slice(1),16);return[n>>16&255,n>>8&255,n&255];}
function _hex(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
// メンバー代表色を紙色(#f1ede2)と混ぜ、淡くトーンを整えた背景色を作る
function softTint(hex){const [r,g,b]=_rgb(hex),[pr,pg,pb]=_rgb('#f1ede2'),k=0.80;return _hex(r*(1-k)+pr*k, g*(1-k)+pg*k, b*(1-k)+pb*k);}
// 写真の平均色を抽出（file://でcanvasが読めない場合はnullを返しフォールバック）
function extractColor(src, cb){
  const img=new Image();
  img.onload=function(){
    try{
      const s=20, c=document.createElement('canvas'); c.width=s; c.height=s;
      const x=c.getContext('2d'); x.drawImage(img,0,0,s,s);
      const d=x.getImageData(0,0,s,s).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){ if(d[i+3]<128) continue; r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
      if(n){ cb(_hex(r/n,g/n,b/n)); return; }
    }catch(e){}
    cb(null);
  };
  img.onerror=function(){ cb(null); };
  img.src=src;
}

function render(){
  const t=T[lang];
  const isResult = step>=QUESTIONS.length;
  foot.textContent = isResult ? t.foot : "";
  document.body.style.background = isResult ? softTint(ranked()[0].m.color) : "";
  card.className = step===-1 ? 'card intro' : (isResult ? 'card result' : 'card');
  if(step===-1){ renderIntro(t); return; }
  if(step<QUESTIONS.length){ renderQuestion(t); return; }
  renderResult(t);
}

function renderIntro(t){
  card.innerHTML=`
    <h1>${t.h1a}<br><span class="g">${t.h1g}</span>${t.h1b}</h1>
    <p class="lead">${t.lead}</p>
    <p class="note">${t.note}</p>
    <button class="btn" onclick="startQuiz()">${t.start}</button>
  `;
}

function renderQuestion(t){
  const q=QUESTIONS[step];
  const pct=Math.round((step/QUESTIONS.length)*100);
  const hasImg=q.o.some(o=>o.img);
  const optsHtml = hasImg
    ? `<div class="imgopts">`+q.o.map((o,i)=>`<button class="imgopt" data-i="${i}"><img src="${encodeURI(o.img)}" alt="" loading="lazy"><span>${o[lang]}</span></button>`).join("")+`</div>`
    : `<div class="opts">`+q.o.map((o,i)=>`<button class="opt" data-i="${i}">${o[lang]}</button>`).join("")+`</div>`;
  card.innerHTML=`
    <button class="back" onclick="goBack()">${t.back}</button>
    <div class="prog"><i style="width:${pct}%; --p:${pct}"></i></div>
    <div class="qcount">${step+1} ${t.of} ${QUESTIONS.length}</div>
    <div class="qtext">${q[lang]}</div>
    ${optsHtml}
  `;
  card.querySelectorAll(".opt,.imgopt").forEach(b=>{
    b.onclick=()=> answer(q.o[+b.dataset.i]);
  });
}

function renderResult(t){
  const r=ranked();
  const top=r[0];
  const maxPct=Math.max(1, r[0].pct);

  const rankHtml = r.slice(0,3).map((x,idx)=>{
    return `<div class="rankrow ${idx===0?'top':''}">
      <div class="rk">${idx+1}</div>
      <div class="rn">${x.m.name}</div>
      <div class="rb"><i style="width:${x.pct}%;background:${x.m.color}"></i></div>
      <div class="rp">${x.pct}%</div>
    </div>`;
  }).join("");

  // タイプ傾向：メンバーの値 と あなたの回答（投票の加重平均）を並べて比較
  const av = MEMBER_AXES[top.m.id] || [50,50,50,50];
  const totV = MEMBERS.reduce((s,m)=> s+votes[m.id], 0) || 1;
  const userAxis = AXES2.map((_,i)=> MEMBERS.reduce((s,m)=> s + votes[m.id]*((MEMBER_AXES[m.id]||[50,50,50,50])[i]), 0) / totV);
  const clamp = x => Math.max(0, Math.min(100, x));
  const axisHtml = AXES2.map((ax,i)=>{
    const mv = clamp(av[i]), uv = clamp(userAxis[i]);
    return `<div class="axis">
      <div class="axis-l"><span>${ax.l[lang]}</span><span>${ax.r[lang]}</span></div>
      <div class="axis-t"><span class="mk mk-u" style="left:${uv}%"></span><span class="mk mk-m" style="left:${mv}%"></span></div>
    </div>`;
  }).join("");
  const styleHtml = `<div class="subhead">${t.styleHead}</div>`
    + `<div class="axleg"><span class="sw sw-m"></span>${top.m.name}<span class="sw sw-u"></span>${t.you}</div>`
    + `<div class="axes2">${axisHtml}</div>`;

  // 傾向分析（得意なこと / 苦手なこと）タブ
  const tr = MEMBER_TRAITS[top.m.id];
  const analysisHtml = tr
    ? `<div class="subhead">${t.traitHead}</div>`
      + `<div class="tabs"><button class="tab on" data-t="good" onclick="setTab('good')">${t.good}</button><button class="tab" data-t="weak" onclick="setTab('weak')">${t.weak}</button></div>`
      + `<ul class="tlist" data-t="good">${tr.good[lang].map(x=>`<li>${x}</li>`).join("")}</ul>`
      + `<ul class="tlist" data-t="weak" style="display:none">${tr.weak[lang].map(x=>`<li>${x}</li>`).join("")}</ul>`
    : "";

  // 90%以上一致カウンター（top.pct>=90 のときだけ表示）
  const hitCached = hitState && hitState.id===top.m.id;
  const hitHtml = top.pct>=90
    ? `<div class="rhit" id="rhit"${hitCached?'':' style="display:none"'}>${hitCached?T[lang].hit(top.m.name, hitState.n):''}</div>`
    : "";

  card.innerHTML=`
    <div class="rmatch">${t.resultMatch}</div>
    <div class="rface" style="background:${top.m.color}">${top.m.init}<img src="${encodeURI(top.m.id)}.jpg" alt="" onerror="this.remove()"></div>
    <div class="rpct">${top.pct}%</div>
    ${hitHtml}
    <div class="rname">${top.m.name}</div>
    <div class="rtitle">${top.m.title[lang]}</div>
    <div class="rdesc">${top.m.desc[lang]}</div>
    ${styleHtml}
    <div class="subhead">${t.rankHead}</div>
    <div class="rank">${rankHtml}</div>
    ${analysisHtml}
    <div class="rshare" id="rshare" onclick="copyUrl()">${t.share}</div>
    <button class="btn ghost" onclick="startQuiz()">${t.retry}</button>
  `;
  // 90%以上ならカウンターを+1して表示（一度だけ）
  if(top.pct>=90 && !hitCached && !hitBusy){
    hitBusy=true;
    fetchHit(top.m.id, function(n){
      hitBusy=false;
      if(n==null) return;
      hitState={id:top.m.id, n:n};
      if(step>=QUESTIONS.length && ranked()[0].m.id===top.m.id){
        var el=document.getElementById('rhit');
        if(el){ el.innerHTML=T[lang].hit(top.m.name, n); el.style.display=''; }
      }
    });
  }
  // 可能なら写真から色を抽出して背景を更新（不可なら代表色のまま）
  extractColor(encodeURI(top.m.id)+'.jpg', function(c){
    if(c && step>=QUESTIONS.length && ranked()[0].m.id===top.m.id){
      document.body.style.background = softTint(c);
    }
  });
}

render();
</script>
</body>
</html>
