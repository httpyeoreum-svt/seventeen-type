<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVENTEEN 相性診断 / 궁합 진단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f1ede2;
    --card:#fffdf6;
    --ink:#1c1b18;
    --ink-soft:#726c5f;
    --accent:#df6f8c;
    --accent-d:#cc5d7b;
    --track:#e7e0d2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Noto Sans JP","Noto Sans KR","Hiragino Kaku Gothic ProN","Malgun Gothic",system-ui,sans-serif;
    background:var(--paper);
    color:var(--ink); min-height:100%;
    display:flex; align-items:flex-start; justify-content:center;
    padding:34px 16px 66px;
    -webkit-font-smoothing:antialiased;
    transition:background .5s ease;
  }
  .wrap{width:100%; max-width:588px; position:relative}

  .langbar{display:flex; justify-content:flex-end; margin-bottom:18px}
  .langbar button{
    border:1.5px solid var(--ink); background:transparent; color:var(--ink);
    padding:6px 15px; font-size:12.5px; font-weight:700; cursor:pointer; letter-spacing:.03em; transition:.12s;
  }
  .langbar button + button{border-left:none}
  .langbar button.on{background:var(--ink); color:var(--paper)}

  .card{
    background:var(--card); border:1.5px solid var(--ink);
    box-shadow:8px 8px 0 var(--ink);
    padding:34px 30px 30px; position:relative;
  }

  .kicker{font-size:12px; letter-spacing:.24em; font-weight:800; color:var(--accent); text-transform:uppercase}
  h1{font-size:27px; line-height:1.45; margin:2px 0 6px; font-weight:700; letter-spacing:-.01em}
  h1 .g{color:var(--accent)}
  .lead{color:var(--ink-soft); font-size:14px; line-height:1.9; margin:16px 0 4px}
  .lead small{display:inline-block; margin-top:12px; font-size:11px; color:#9a9488; line-height:1.75}

  .btn{
    display:block; width:100%; border:1.5px solid var(--ink); cursor:pointer;
    background:var(--accent); color:#fff;
    font-size:15.5px; font-weight:800; letter-spacing:.03em; padding:15px;
    box-shadow:4px 4px 0 var(--ink); transition:transform .1s, box-shadow .1s; margin-top:24px;
  }
  .btn:hover{transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--ink)}
  .btn:active{transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink)}
  .btn.ghost{background:var(--card); color:var(--ink); box-shadow:none; margin-top:12px}
  .btn.ghost:hover{background:#efe9dc; transform:none; box-shadow:none}

  .prog{height:6px; background:var(--track); border:1.5px solid var(--ink); overflow:hidden; margin-bottom:10px}
  .prog i{display:block; height:100%; width:0; background:linear-gradient(90deg, var(--accent) 0%, #bd7fbf 50%, #7fa8e6 100%); background-size:calc(10000% / var(--p, 100)) 100%; background-repeat:no-repeat; background-position:left center; transition:.35s}
  .qcount{font-size:11px; font-weight:800; color:var(--ink-soft); letter-spacing:.16em; text-transform:uppercase; margin-bottom:18px; text-align:right}
  .back{display:inline-flex; align-items:center; gap:8px; background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:700; cursor:pointer; padding:2px 0; margin-bottom:14px; transition:.12s}
  .back:hover{color:var(--accent)}
  .back svg{width:17px; height:17px; stroke:currentColor; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round}
  .qtext{font-size:19.5px; line-height:1.55; font-weight:700; letter-spacing:-.01em; margin-bottom:22px; min-height:30px}
  .opts{display:flex; flex-direction:column; gap:10px}
  .opt{
    text-align:left; border:1.5px solid var(--ink); background:var(--card); color:var(--ink);
    padding:14px 16px; font-size:14.5px; line-height:1.5; font-weight:600; cursor:pointer;
    transition:transform .1s, box-shadow .1s, background .1s, color .1s; box-shadow:3px 3px 0 rgba(28,27,24,.13);
  }
  .opt:hover{background:var(--accent); color:#fff; box-shadow:4px 4px 0 var(--ink); transform:translate(-1px,-1px)}

  .imgopts{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .imgopt{border:1.5px solid var(--ink); background:var(--card); padding:10px; cursor:pointer;
    display:flex; flex-direction:column; gap:9px; align-items:center; text-align:center;
    transition:transform .1s, box-shadow .1s; box-shadow:3px 3px 0 rgba(28,27,24,.13)}
  .imgopt:hover{transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--ink)}
  .imgopt img{width:100%; aspect-ratio:1/1; object-fit:cover; border:1.5px solid var(--ink); display:block; background:#eae4d6}
  .imgopt span{font-size:12.5px; font-weight:700; line-height:1.45; color:var(--ink)}

  .rface{
    position:relative; overflow:hidden;
    width:96px; height:96px; border:1.5px solid var(--ink); box-shadow:5px 5px 0 var(--ink); margin:2px auto 18px;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; font-weight:800; color:#fff; letter-spacing:.02em;
  }
  .rface img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .rmatch{text-align:center; font-size:11px; font-weight:800; letter-spacing:.2em; color:var(--accent); text-transform:uppercase}
  .rname{text-align:center; font-size:29px; font-weight:800; letter-spacing:-.01em; margin:7px 0 3px}
  .rtitle{text-align:center; font-size:14.5px; font-weight:800; color:var(--ink); margin-bottom:20px}
  .rpct{display:none}
  .rdesc{font-size:14px; line-height:1.95; color:#37342c; background:#f4eee1; border:1.5px solid var(--ink); padding:18px; margin-bottom:22px}

  .subhead{font-size:11px; font-weight:800; letter-spacing:.18em; color:var(--ink); text-transform:uppercase; margin:6px 0 14px; text-align:center}
  .rank{margin:6px 0 20px}
  .rankrow{display:grid; grid-template-columns:22px 76px 1fr 40px; align-items:center; gap:9px; margin-bottom:8px}
  .rankrow .rk{font-size:12px; font-weight:800; color:#bcb3a1; text-align:center}
  .rankrow .rn{font-size:12.5px; font-weight:800; color:var(--ink)}
  .rankrow .rb{height:13px; background:var(--track); border:1.5px solid var(--ink); overflow:hidden}
  .rankrow .rb i{display:block; height:100%}
  .rankrow .rp{font-size:12px; font-weight:800; color:var(--ink-soft); text-align:right}
  .rankrow.top .rn{color:var(--accent)}
  .rankrow.top .rk{color:var(--accent)}

  .foot{text-align:center; font-size:10.5px; color:#a49d8e; margin-top:18px; line-height:1.7}
  @media(max-width:480px){
    .card{padding:26px 20px; box-shadow:6px 6px 0 var(--ink)}
    h1{font-size:25px}
    .qtext{font-size:18px}
    .rname{font-size:27px}
    .rankrow{grid-template-columns:20px 60px 1fr 34px; gap:7px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="langbar">
    <button id="lang-ja" class="on" onclick="setLang('ja')">日本語</button>
    <button id="lang-ko" onclick="setLang('ko')">한국어</button>
  </div>
  <div class="card" id="card"></div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ============================================================
   SEVENTEEN 相性診断 — メンバー投票制
   採点: 各選択肢の m:[memberId...] にメンバーを割り当てる。
        回答されるとそのメンバーに1票。最多得票が診断結果。
   member id: scoups jeonghan joshua jun hoshi wonwoo woozi
              the8 mingyu dk seungkwan vernon dino
   ============================================================ */

const MEMBERS = [
  { id:"scoups", color:"#e4788f", init:"SC", name:"S.COUPS",
    title:{ja:"沈思黙考の努力家リーダー", ko:"심사숙고하는 노력파 리더"},
    sim:{ja:"気質が <b>DK・SEUNGKWAN</b> と同じ", ko:"기질이 <b>도겸·승관</b>과 같음"},
    desc:{ja:"感受性が豊かで色んな感情を繊細に感じ取るけれど、興味があってもすぐ実行には移さず沈思黙考するタイプ。対人では丁寧で礼儀正しい。自分と周りをより良くしたいという想いが強く、成功や物質への欲求も高め。真面目に努力し続けるのは少し苦手で、達成動機は高いのに自分では満足しきれない…そんな最年長リーダー。頼られれば自分を後回しにしてでも助けようとする寛大さがあり、その堂々とした立ち姿で自然と人を惹きつける。",
        ko:"감수성이 풍부해 여러 감정을 섬세하게 느끼지만, 관심이 있어도 바로 실행에 옮기기보다 심사숙고하는 타입. 사람을 대할 땐 정중하고 예의 바름. 나와 주변을 더 낫게 만들고 싶은 마음이 크고 성공·물질 욕구도 높은 편. 꾸준히 노력하는 건 조금 어려워하고, 성취동기는 높은데 스스로는 만족하지 못하는 맏형 리더. 누가 기대면 자신을 뒤로 미루더라도 도우려는 너그러움이 있고, 그 당당한 모습으로 자연스럽게 사람을 끌어당긴다."} },

  { id:"jeonghan", color:"#c98bd6", init:"JH", name:"JEONGHAN",
    title:{ja:"気まぐれマルチーズ", ko:"변덕쟁이 말티즈"}, sim:null,
    desc:{ja:"刺激的で冒険的なことに惹かれるのに、軽率に飛び込むことはめったにない慎重派。ただし窮地に追い込まれると不安定な面が飛び出し、逆に不安が消えると危なそうなことにも大胆に挑む。外向的か内向的か一見わからない。他人への寛大さは控えめで、自分と違う価値観には批判的。仲間の中でも目立ちたい。持続力は低く『まあこれくらいでいいか』が口ぐせ。バランス感覚に優れ、場を見て冗談で空気を和ませるのも上手。争いを避けようとして、つい本音を飲み込んでしまうことも。",
        ko:"자극적이고 모험적인 것에 끌리면서도 경솔하게 뛰어드는 일은 드문 신중파. 다만 궁지에 몰리면 불안정한 면이 튀어나오고, 반대로 불안이 사라지면 위험해 보이는 것에도 대담하게 도전. 외향인지 내향인지 한눈에 알기 어려움. 관대함은 적은 편이라 나와 다른 가치관엔 비판적. 무리 안에서도 튀고 싶어함. 인내력은 낮고 '이 정도면 됐지'가 습관. 균형 감각이 뛰어나고 분위기를 봐서 농담으로 공기를 풀어주는 것도 능숙. 다툼을 피하려다 문득 속마음을 삼켜버리기도."} },

  { id:"joshua", color:"#7ea6e6", init:"JS", name:"JOSHUA",
    title:{ja:"独創的な社交家", ko:"독창적인 사교가"},
    sim:{ja:"性格が <b>THE 8</b> と同じ／気質は <b>MINGYU</b> とも", ko:"성격이 <b>디에잇</b>과 같고 기질은 <b>민규</b>와도"},
    desc:{ja:"人付き合いを楽しみ、集団の中で認められ愛されたいタイプ。社交的で感情豊か、自分に関心が集まる状況が好き。その分感情の起伏が激しく少し不安定で、外の状況に敏感に反応しすぎることも。独創的でクリエイティブ、集団の中でもよく目立つ。時に自分の欲求に没頭して自己中で現実離れした印象を与えることも。派手さより着実さで、一歩ずつ我慢強く目標へ近づく努力家。飾らない誠実さと独特のユーモアで信頼を集める。",
        ko:"사람들과 어울리는 걸 즐기고 집단 안에서 인정받고 사랑받고 싶은 타입. 사교적이고 감정이 풍부하며 자신에게 관심이 모이는 상황을 좋아함. 그만큼 감정 기복이 크고 조금 불안정해 외부 상황에 예민하게 반응하기도. 독창적이고 창의적이라 무리 안에서도 잘 눈에 띔. 가끔 자기 욕구에 빠져 자기중심적이고 붕 뜬 인상을 주기도. 화려함보다 착실함으로 한 걸음씩 끈기 있게 목표에 다가가는 노력파. 꾸밈없는 성실함과 독특한 유머로 신뢰를 얻는다."} },

  { id:"jun", color:"#6fc4b8", init:"JUN", name:"JUN",
    title:{ja:"大胆な冒険家", ko:"대담한 모험가"}, sim:null,
    desc:{ja:"新しい状況や初対面の人にも迷わず積極的に近づく外向タイプ。危険を伴うことにも大胆に挑戦し、スリルを好む。困難が予想されてもあまり心配しない。同じことの繰り返しは苦手で、絶えず変化を求める。物事がうまくいかないと落ち着かなくなる面も。他人と深い部分まで共感するのは難しく、自分と考えの違う人を簡単には受け入れないタイプ。好奇心が旺盛で色々なことに興味が湧くぶん、一つを極める前に次へ心が移りやすい移り気な一面も。",
        ko:"새로운 상황이나 처음 보는 사람에게도 망설임 없이 다가가는 외향 타입. 위험한 일에도 대담하게 도전하고 스릴을 즐김. 어려움이 예상돼도 크게 걱정하지 않음. 같은 일의 반복은 싫어하고 끊임없이 변화를 원함. 일이 잘 안 풀리면 안절부절 못하는 면도. 남과 깊이 공감하긴 어렵고, 나와 생각이 다른 사람을 쉽게 받아들이지 않는 타입. 호기심이 왕성해 여러 가지에 관심이 생기는 만큼, 하나를 파고들기 전에 다음으로 마음이 옮겨가는 변덕스러운 면도."} },

  { id:"hoshi", color:"#f0985a", init:"HS", name:"HOSHI",
    title:{ja:"情熱と責任感No.1", ko:"열정과 책임감 1위"}, sim:null,
    desc:{ja:"内気に見えるかもしれないけど、実は豊かな感受性と瞬発力を持つ情熱的なタイプ。状況で感情が大きく揺れ、内気な自分でありたいと気まぐれにアピールする一面も。目標がはっきりしていて『自分ならできる』という確信があり、担ったことに全力を尽くす。協力の場でトラブルが起きると他人を非難することもあるほど、成し遂げる意志が誰よりも強いリーダー気質。好奇心旺盛で興味の幅が広く、ときどきハッとするような突飛な発想も飛び出す。",
        ko:"수줍어 보일 수 있지만 사실은 풍부한 감수성과 순발력을 지닌 열정적인 타입. 상황에 따라 감정이 크게 흔들리고, 내향적이고 싶다며 변덕스럽게 어필하는 면도. 목표가 뚜렷하고 '나라면 할 수 있다'는 확신이 있어 맡은 일에 전력을 다함. 협업 중 문제가 생기면 남을 탓하기도 할 만큼, 해내려는 의지가 누구보다 강한 리더 기질. 호기심이 왕성하고 관심사가 넓어, 가끔 번뜩이는 엉뚱한 발상이 튀어나오기도."} },

  { id:"wonwoo", color:"#5b6bb0", init:"WW", name:"WONWOO",
    title:{ja:"慎重なビジュアル", ko:"신중한 비주얼"},
    sim:{ja:"気質が <b>DINO</b> と同じ", ko:"기질이 <b>디노</b>와 같음"},
    desc:{ja:"色んな可能性を考慮して慎重に判断・行動するタイプ。少し臆病で冷たい印象を与えることも。小さなことまで心配するので、利己的に見えることもある。所有欲が強く、何かを譲るのはあまり得意ではない。人見知りで、打ち解けるまでには少し時間がかかるけれど、心を許した相手にはまっすぐ向き合う人。そばにいると場が和む優しさを持つ一方、人の感情に影響されやすく、繊細に傷つきやすい心の持ち主でもある。",
        ko:"여러 가능성을 따져 신중하게 판단·행동하는 타입. 조금 소심하고 차가운 인상을 주기도. 사소한 것까지 걱정해서 이기적으로 보일 때도. 소유욕이 강해 뭔가 양보하는 건 별로 잘 못하는 편. 낯을 가려 친해지기까지 시간이 조금 걸리지만, 마음을 연 상대에겐 진심으로 대하는 사람. 곁에 있으면 분위기가 편안해지는 다정함을 지닌 한편, 남의 감정에 영향을 잘 받고 섬세하게 상처받기 쉬운 마음의 소유자."} },

  { id:"woozi", color:"#8f7ad6", init:"WZ", name:"WOOZI",
    title:{ja:"完璧主義の社長", ko:"완벽주의 사장님"}, sim:null,
    desc:{ja:"どちらかというと『社長』スタイル。細かい性格で小さなことも見逃さず、ルールや基準を守ることに厳しい。物事を完璧に準備して体系的に処理するのを好み、感情は外に出さずコントロールする。完璧主義ゆえに効率が落ちることもあり、少し融通が利かない一面も。誰かと協力するより一人で頑張る方が好きで、トラブルで傷つくと相手を簡単には許せないタイプ。自分だけの確かな見解を持ち、周りにも自分にも高いものを求めながら、それに見合う努力を惜しまない。",
        ko:"굳이 따지면 '사장님' 스타일. 꼼꼼한 성격이라 사소한 것도 놓치지 않고 규칙과 기준을 지키는 데 엄격함. 일을 완벽하게 준비해 체계적으로 처리하는 걸 좋아하고 감정은 밖으로 안 드러내고 조절함. 완벽주의 탓에 효율이 떨어질 때도 있고 조금 융통성이 없는 면도. 협력보다 혼자 해내는 걸 선호하고, 갈등으로 상처받으면 상대를 쉽게 용서하지 못하는 타입. 자신만의 확고한 견해를 지니고, 주변에도 자신에게도 높은 것을 요구하면서 그에 걸맞은 노력을 아끼지 않는다."} },

  { id:"the8", color:"#59b3a0", init:"T8", name:"THE 8",
    title:{ja:"クリエイティブな自由人", ko:"크리에이티브한 자유인"},
    sim:{ja:"性格が <b>JOSHUA</b> と同じ／気質は <b>MINGYU</b> とも", ko:"성격이 <b>조슈아</b>과 같고 기질은 <b>민규</b>와도"},

/* ---------- UI text ---------- */
const T = {
  ja:{
    kicker:"SEVENTEEN 相性診断",
    h1a:"あなたに一番似ている", h1g:"SEVENTEENメンバー", h1b:"は？",
    lead:"いくつかの質問に答えるだけでOK。<br>あなたの選択の傾向が一番近いメンバーを診断します。<br><small>※GOING SEVENTEEN『너 자신을 알라』#1＆#2 の内容を元に作成しました。<br>※本診断の結果は娯楽を目的としたもので、医学的・心理学的な診断を意図したものではありません。</small>",
    tags:["メンバー投票制","相性ランキング付き","日本語／한국어"],
    start:"診断をはじめる",
    q:"問", of:"／", back:"前の質問へ",

    foot:"",
    similar:"番組では",
  },
  ko:{
    kicker:"SEVENTEEN 궁합 진단",
    h1a:"당신과 가장 닮은", h1g:"세븐틴 멤버", h1b:"는?",
    lead:"몇 가지 질문에 답하면 끝!<br>당신의 선택 성향이 가장 가까운 멤버를 진단합니다.<br><small>※고잉 세븐틴 『너 자신을 알라』 #1＆#2 내용을 바탕으로 제작했습니다.<br>※본 진단 결과는 오락을 목적으로 하며, 의학적·심리학적 진단을 의도한 것이 아닙니다.</small>",
    tags:["멤버 투표제","궁합 랭킹 포함","日本語／한국어"],
    start:"진단 시작하기",
    q:"문항", of:"／", back:"이전 질문으로",
    resultMatch:"BEST MATCH",

/* ---------- state ---------- */
let lang = "ja";
let step = -1;            // -1 intro, 0..n-1 questions, n result
let votes = {};
let history = [];         // 回答した選択肢を順に記録（戻る用）
const card = document.getElementById("card");
const foot = document.getElementById("foot");

function resetScores(){ votes={}; history=[]; MEMBERS.forEach(m=> votes[m.id]=0); }

function setLang(l){
  lang=l;
  document.getElementById("lang-ja").classList.toggle("on", l==="ja");
  document.getElementById("lang-ko").classList.toggle("on", l==="ko");
  render();
}

function startQuiz(){ resetScores(); step=0; render(); }

function answer(opt){
  history.push(opt);
  (opt.m||[]).forEach(id=>{ if(votes[id]!=null) votes[id]++; });
  step++;
  render();
}

function goBack(){
  if(step<=0){ step=-1; render(); return; }   // 最初の問題 → イントロへ
  step--;
  const prev=history.pop();
  if(prev){ (prev.m||[]).forEach(id=>{ if(votes[id]!=null) votes[id]--; }); }
  render();
}

function ranked(){
  const total=QUESTIONS.length;
  return MEMBERS
    .map((m,i)=>({ m, v:votes[m.id], pct:Math.round(votes[m.id]/total*100), i }))
    .sort((a,b)=> b.v-a.v || a.i-b.i );
}

/* ---------- render ---------- */
function _rgb(hex){const n=parseInt(hex.slice(1),16);return[n>>16&255,n>>8&255,n&255];}
function _hex(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
// メンバー代表色を紙色(#f1ede2)と混ぜ、淡くトーンを整えた背景色を作る
function softTint(hex){const [r,g,b]=_rgb(hex),[pr,pg,pb]=_rgb('#f1ede2'),k=0.80;return _hex(r*(1-k)+pr*k, g*(1-k)+pg*k, b*(1-k)+pb*k);}
// 写真の平均色を抽出（file://でcanvasが読めない場合はnullを返しフォールバック）
function extractColor(src, cb){
  const img=new Image();
  img.onload=function(){
    try{
      const s=20, c=document.createElement('canvas'); c.width=s; c.height=s;
      const x=c.getContext('2d'); x.drawImage(img,0,0,s,s);
      const d=x.getImageData(0,0,s,s).data;
      let r=0,g=0,b=0,n=0;
      for(let i=0;i<d.length;i+=4){ if(d[i+3]<128) continue; r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
      if(n){ cb(_hex(r/n,g/n,b/n)); return; }
    }catch(e){}
    cb(null);
  };
  img.onerror=function(){ cb(null); };
  img.src=src;
}

function render(){
  const t=T[lang];
  const isResult = step>=QUESTIONS.length;
  foot.textContent = isResult ? t.foot : "";
  document.body.style.background = isResult ? softTint(ranked()[0].m.color) : "";
  if(step===-1){ renderIntro(t); return; }
  if(step<QUESTIONS.length){ renderQuestion(t); return; }
  renderResult(t);
}

function renderIntro(t){
  card.innerHTML=`
    <h1>${t.h1a}<br><span class="g">${t.h1g}</span>${t.h1b}</h1>
    <p class="lead">${t.lead}</p>
    <button class="btn" onclick="startQuiz()">${t.start}</button>
  `;
}

function renderQuestion(t){
  const q=QUESTIONS[step];
  const pct=Math.round((step/QUESTIONS.length)*100);
  const hasImg=q.o.some(o=>o.img);
  const optsHtml = hasImg
    ? `<div class="imgopts">`+q.o.map((o,i)=>`<button class="imgopt" data-i="${i}"><img src="${encodeURI(o.img)}" alt="" loading="lazy"><span>${o[lang]}</span></button>`).join("")+`</div>`
    : `<div class="opts">`+q.o.map((o,i)=>`<button class="opt" data-i="${i}">${o[lang]}</button>`).join("")+`</div>`;
  card.innerHTML=`
    <button class="back" onclick="goBack()">${t.back}</button>
    <div class="prog"><i style="width:${pct}%; --p:${pct}"></i></div>
    <div class="qcount">${step+1} ${t.of} ${QUESTIONS.length}</div>
    <div class="qtext">${q[lang]}</div>
    ${optsHtml}
  `;
  card.querySelectorAll(".opt,.imgopt").forEach(b=>{
    b.onclick=()=> answer(q.o[+b.dataset.i]);
  });
}

function renderResult(t){
  const r=ranked();
  const top=r[0];
  const maxPct=Math.max(1, r[0].pct);

  const rankHtml = r.slice(0,3).map((x,idx)=>{
    const w = Math.round((x.pct/maxPct)*100);
    return `<div class="rankrow ${idx===0?'top':''}">
      <div class="rk">${idx+1}</div>
      <div class="rn">${x.m.name}</div>
      <div class="rb"><i style="width:${w}%;background:${x.m.color}"></i></div>
      <div class="rp">${x.pct}%</div>
    </div>`;
  }).join("");

  card.innerHTML=`
    <div class="rface" style="background:${top.m.color}">${top.m.init}<img src="${encodeURI(top.m.id)}.jpg" alt="" onerror="this.remove()"></div>
    <div class="rmatch">${t.resultMatch} · ${top.pct}%</div>
    <div class="rname">${top.m.name}</div>
    <div class="rtitle">${top.m.title[lang]}</div>
    <div class="rpct"></div>
    <div class="rdesc">${top.m.desc[lang]}</div>
    <div class="subhead">${t.rankHead}</div>
    <div class="rank">${rankHtml}</div>
    <button class="btn ghost" onclick="startQuiz()">${t.retry}</button>
  `;
  // 可能なら写真から色を抽出して背景を更新（不可なら代表色のまま）
  extractColor(encodeURI(top.m.id)+'.jpg', function(c){
    if(c && step>=QUESTIONS.length && ranked()[0].m.id===top.m.id){
      document.body.style.background = softTint(c);
    }
  });
}

render();
</script>
